<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Image Page</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
      max-width: 800px;
      width: 90%;
    }

    h1 {
      margin-bottom: 20px;
      color: #222;
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      display: block;
      margin: 0 auto;
    }

    p {
      margin-top: 15px;
      color: #555;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>My Image</h1>
    <img src="YOUR_IMAGE_URL_HERE" alt="My uploaded image">
    <p>Replace the image URL in the code with your own image address.</p>
  </div>
</body>
</html>
